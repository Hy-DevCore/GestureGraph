<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestureGraph - 知识图谱手势交互展示系统</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="graph-container"></div>

    <div id="top-bar">
      <div class="brand">
        <span class="logo">GestureGraph</span>
        <span class="tagline">隔空取物 · 漫游知识</span>
      </div>
      <div class="controls">
        <button id="btn-start-gesture" class="btn btn-primary">开启手势</button>
        <button id="btn-reset-camera" class="btn btn-secondary">重置视角</button>
        <button id="btn-reload" class="btn btn-secondary">刷新数据</button>
      </div>
    </div>

    <div id="status-bar">正在初始化...</div>

    <div id="gesture-panel">
      <div class="gesture-header">
        <span>手势摄像头</span>
        <span id="gesture-status">手势: 未启动</span>
      </div>
      <div class="gesture-viewport">
        <video id="gesture-video" playsinline></video>
        <canvas id="gesture-canvas"></canvas>
      </div>
      <div id="gesture-indicator" class="gesture-indicator none">👋 未检测</div>
      <div id="vector-display">dx: 0.00 | dy: 0.00</div>
    </div>

    <div id="sidebar">
      <div class="sidebar-header">
        <h3>节点详情</h3>
        <button id="btn-close-sidebar" class="btn-close">&times;</button>
      </div>
      <div id="sidebar-content"></div>
    </div>

    <div id="legend">
      <div class="legend-title">图例</div>
      <div class="legend-items">
        <div class="legend-item"><span class="legend-dot" style="background:#ff6b6b"></span>人物</div>
        <div class="legend-item"><span class="legend-dot" style="background:#4ecdc4"></span>组织</div>
        <div class="legend-item"><span class="legend-dot" style="background:#45b7d1"></span>技术</div>
        <div class="legend-item"><span class="legend-dot" style="background:#96ceb4"></span>概念</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ffeaa7"></span>事件</div>
        <div class="legend-item"><span class="legend-dot" style="background:#f7dc6f"></span>产品</div>
      </div>
      <div class="legend-gestures">
        <div class="legend-gesture">🖐 张开手掌 = 漫游</div>
        <div class="legend-gesture">✊ 握拳 = 选择</div>
      </div>
    </div>
  </div>

  <script src="js/gesture.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
