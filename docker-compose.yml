version: "3.8"

services:
  neo4j:
    image: neo4j:5.18.0
    container_name: gesturegraph-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/gesturegraph2024
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - gesturegraph-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p gesturegraph2024 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gesturegraph-backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: gesturegraph2024
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - gesturegraph-net
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: gesturegraph-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - gesturegraph-net
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  gesturegraph-net:
    driver: bridge
